<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>✨ Storytime — Bedtime Story Generator</title>
</head>
<body>

<div>
  <input type="password" id="apiKey" placeholder="API Key" />

  <input type="text" id="childName" placeholder="Child Name" />

  <select id="language">
    <option value="English">English</option>
    <option value="Romanian">Romanian</option>
    <option value="Hungarian">Hungarian</option>
  </select>

  <select id="theme">
    <option value="dragons and castles">Dragons</option>
    <option value="outer space adventure">Space</option>
  </select>

  <select id="age">
    <option value="young child (4-6 years old)">4–6</option>
  </select>

  <select id="length">
    <option value="10 minute bedtime story (~1200 words)">10 minutes</option>
    <option value="12 minute bedtime story (~1500 words)" selected>12 minutes</option>
    <option value="15 minute bedtime story (~1800 words)">15 minutes</option>
  </select>

  <button onclick="generateStory()">Generate</button>

  <pre id="output"></pre>
</div>

<script>
async function generateStory() {
  const apiKey = document.getElementById('apiKey').value;
  const childName = document.getElementById('childName').value;
  const theme = document.getElementById('theme').value;
  const age = document.getElementById('age').value;
  const length = document.getElementById('length').value;
  const language = document.getElementById('language').value;

  const prompt = `Write a calming bedtime story for a child named ${childName}.

Theme: ${theme}
Age: ${age}
Length: ${length}

Language: ${language}

Requirements:
- Gentle, soothing tone throughout
- No scary or intense moments
- Slow, calming pacing
- Use soft, comforting imagery (night sky, stars, cozy places)
- Repeat the child's name naturally
- Gradually become quieter and more peaceful

Ending:
- Make the ending sleepy and safe
- Help the child relax and fall asleep

Format:
- First line: title only
- Blank line
- Then the story`;

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1500,
      messages: [{ role: 'user', content: prompt }]
    })
  });

  const data = await res.json();
  document.getElementById('output').textContent =
    data.content?.[0]?.text || 'Error generating story';
}
</script>

</body>
</html>
